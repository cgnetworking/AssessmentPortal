<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Assessments Layout</title>
    <style>
      :root {
        --ink: #2f2147;
        --line: #e9e4ee;
        --panel: #ffffff;
        --app-bg: #f8f5fb;
        --side-bg: #faf6fd;
        --active: #8d45e8;
        --active-soft: #f0e6ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f2eef6;
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        letter-spacing: 0;
      }

      .app-shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: 56px 1fr;
        background: var(--app-bg);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        padding: 0 18px;
        background: var(--panel);
        border-bottom: 1px solid var(--line);
        box-shadow: 0 1px 0 rgba(39, 25, 63, 0.04);
      }

      .brand {
        font-weight: 800;
        font-size: 21px;
        color: #321541;
      }

      .profile-button {
        display: inline-grid;
        place-items: center;
        flex: 0 0 auto;
        width: 30px;
        height: 30px;
        border: 0;
        border-radius: 50%;
        background: #eed8ff;
        color: #8b39e8;
        font-weight: 800;
      }

      .workspace {
        min-width: 0;
        display: grid;
        grid-template-columns: 192px 1fr;
      }

      .sidebar {
        min-height: calc(100vh - 56px);
        padding: 16px 10px;
        background: var(--side-bg);
        border-right: 1px solid var(--line);
      }

      .search {
        width: 100%;
        height: 32px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 11px;
        border: 1px solid transparent;
        border-radius: 9px;
        background: #f1ecf6;
        color: #9a91a6;
        font-size: 12px;
      }

      .nav {
        margin-top: 14px;
      }

      .nav-item {
        width: 100%;
        height: 34px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 12px;
        border-radius: 6px;
        color: #4f3b62;
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
      }

      .nav-item.active {
        background: var(--active-soft);
        color: var(--active);
      }

      .nav-icon {
        width: 15px;
        height: 15px;
        display: inline-grid;
        place-items: center;
        color: currentColor;
      }

      .content {
        min-width: 0;
        padding: 24px 28px 36px;
        background: var(--panel);
      }

      .page-heading {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 14px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.2;
        font-weight: 780;
        color: var(--ink);
      }

      .button {
        height: 36px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        color: #2f2147;
        font-weight: 700;
        font-size: 13px;
      }

      @media (max-width: 760px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        .sidebar {
          min-height: auto;
          padding: 10px;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .search {
          display: none;
        }

        .nav {
          margin-top: 0;
        }

        .content {
          padding: 20px 14px 28px;
        }

        .page-heading {
          align-items: stretch;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">ComplianceApp</div>
        <button class="profile-button" aria-label="Account menu">A</button>
      </header>

      <div class="workspace">
        <aside class="sidebar" aria-label="Primary navigation">
          <div class="search" aria-label="Find">
            <svg aria-hidden="true" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="7" />
              <path d="m16 16 4 4" />
            </svg>
            <span>Find...</span>
          </div>
          <nav class="nav">
            <a class="nav-item active" href="#" aria-current="page">
              <span class="nav-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M9 11l2 2 4-5" />
                  <path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9" />
                  <path d="M16 4h4v4" />
                </svg>
              </span>
              Assessments
            </a>
          </nav>
        </aside>

        <main class="content">
          <div class="page-heading">
            <h1>Assessments</h1>
            <button class="button" type="button">
              <span aria-hidden="true">+</span>
              Add assessment
            </button>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
