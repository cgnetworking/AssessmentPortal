map $uri $assessmentportal_csp {
    default "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests";
    ~^/admin(/|$) "";
}

upstream assessmentportal_gunicorn {
    server unix:/run/assessmentportal/gunicorn.sock;
    keepalive 32;
}

server {
    listen 80;
    server_name assessment.example.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name assessment.example.com;

    ssl_certificate /etc/letsencrypt/live/assessment.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/assessment.example.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 25m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy $assessmentportal_csp always;

    root /opt/assessmentportal/frontend/dist;
    index index.html;

    location /static/ {
        alias /opt/assessmentportal/backend/staticfiles/;
        access_log off;
        expires 7d;
    }

    location /api/ {
        proxy_pass http://assessmentportal_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }

    location /auth/ {
        proxy_pass http://assessmentportal_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }

    location /admin/ {
        proxy_pass http://assessmentportal_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
